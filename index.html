<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Project</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
        }
        .status {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s infinite;
            vertical-align: middle;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(0,255,136,0); }
        }
        h1 { font-size: 2.5rem; margin-bottom: 16px; }
        p { font-size: 1.1rem; opacity: 0.75; margin-bottom: 12px; }
        .badge {
            display: inline-block;
            margin-top: 24px;
            padding: 8px 20px;
            background: rgba(0,255,136,0.15);
            border: 1px solid rgba(0,255,136,0.4);
            border-radius: 50px;
            color: #00ff88;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="status"></span>Сервер работает!</h1>
        <p>Веб-сервер успешно запущен в Docker контейнере.</p>
        <p>Порт: <strong>1111</strong> &nbsp;|&nbsp; Образ: <strong>nginx:alpine</strong></p>
        <div class="badge">HTTP 200 OK — test_project</div>
    </div>
</body>
</html>
